server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:
    zipkin:
    jaeger:
      protocols:
        thrift_http:
        thrift_compact:
        thrift_binary:
        grpc:

ingester:
  max_block_duration: 5m               # cut the headblock every 5 minutes

compactor:
  compaction:
    block_retention: 1h                # overall retention

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local                     # backend configuration to use
    wal:
      path: /tmp/tempo/wal             # where to store the wal locally
    local:
      path: /tmp/tempo/blocks

overrides:
  metrics_generator_processors: [service-graphs, span-metrics] # enable metrics generator
